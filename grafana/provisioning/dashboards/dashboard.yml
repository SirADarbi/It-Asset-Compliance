apiVersion: 1

providers:
  - name: compliance-dashboards
    orgId: 1
    folder: Compliance
    folderUid: compliance-folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
