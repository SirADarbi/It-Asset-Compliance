name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python unit + API tests ──────────────────────────────────────────────────
  test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        run: pytest backend/tests/ -v --tb=short

      - name: Report results
        if: always()
        run: echo "Tests completed with exit code $?"

  # ── Infrastructure validation (runs in parallel with tests) ─────────────────
  validate-infra:
    name: Validate Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml syntax
        # Provide placeholder values so the :? required-variable checks in
        # docker-compose.yml don't block syntax validation in CI.
        # These are NOT real credentials — validation only.
        env:
          POSTGRES_PASSWORD: ci-placeholder
          GF_SECURITY_ADMIN_PASSWORD: ci-placeholder
        run: docker compose config --quiet

      - name: Lint shell scripts with ShellCheck
        # SC2154: suppress "var referenced but not assigned" for Terraform
        # template variables (${github_repo}) embedded in user_data.sh
        run: |
          shellcheck -e SC2154 infra/deploy.sh
          shellcheck -e SC2154 infra/terraform/user_data.sh

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra/terraform/
